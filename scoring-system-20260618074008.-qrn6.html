<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>政企事业部战略专项奖评分</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#edf2fc;--surface:#fff;--surface2:#f4f6fb;
  --border:#dfe5f0;--divider:#eef1f8;
  --text:#0f1729;--text2:#4b5672;--text3:#8e99b4;--text4:#b8c0d4;
  --accent:#4f6ef7;--accent2:#7b93f9;--accent-bg:rgba(79,110,247,.06);--accent-bg2:rgba(79,110,247,.12);
  --danger:#e5484d;--danger-bg:rgba(229,72,77,.06);
  --success:#30a46c;--success-bg:rgba(48,164,108,.06);
  --warn:#f59e0b;--warn-bg:rgba(245,158,11,.06);
  --r:12px;--r-sm:8px;--r-lg:16px;
  --shadow-sm:0 1px 2px rgba(15,23,41,.04);
  --shadow:0 2px 8px -1px rgba(15,23,41,.06),0 1px 2px rgba(15,23,41,.04);
  --shadow-md:0 8px 24px -4px rgba(15,23,41,.1);
  --shadow-lg:0 20px 60px -12px rgba(15,23,41,.15);
  --ease:cubic-bezier(.4,0,.2,1);
}
body{font-family:'DM Sans','Microsoft YaHei','PingFang SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;letter-spacing:-.01em;
  background-color:#edf2fc;
  background-image:
    radial-gradient(ellipse 700px 550px at 85% 8%,rgba(79,110,247,.1) 0%,transparent 100%),
    radial-gradient(ellipse 550px 450px at 8% 85%,rgba(123,147,249,.07) 0%,transparent 100%),
    radial-gradient(ellipse 400px 350px at 50% 45%,rgba(167,139,250,.05) 0%,transparent 100%),
    linear-gradient(rgba(79,110,247,.05) 1px,transparent 1px),
    linear-gradient(90deg,rgba(79,110,247,.05) 1px,transparent 1px);
  background-size:100% 100%,100% 100%,100% 100%,40px 40px,40px 40px;
  background-attachment:fixed}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(circle 240px at 78% 6%,rgba(79,110,247,.08),transparent),
    radial-gradient(circle 170px at 5% 92%,rgba(123,147,249,.06),transparent),
    radial-gradient(circle 110px at 45% 20%,rgba(167,139,250,.03),transparent);
  animation:bgShift 16s ease-in-out infinite alternate}
@keyframes bgShift{0%{opacity:1}50%{opacity:.4}100%{opacity:1}}

/* Dot grid overlay */
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(circle 1.5px,rgba(79,110,247,.1) 1px,transparent 1px);
  background-size:40px 40px;
  background-position:20px 20px}

/* All content sits above the bg */
#loginPage,#adminPage,#userPage{position:relative;z-index:1}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ── Login ── */
#loginPage{display:flex;justify-content:center;align-items:center;min-height:100vh;background:#111c32;position:relative;overflow:hidden}
/* Grid lines */
#loginPage::before{content:'';position:absolute;inset:-50%;width:200%;height:200%;pointer-events:none;
  background:
    linear-gradient(rgba(79,110,247,.14) 1px,transparent 1px),
    linear-gradient(90deg,rgba(79,110,247,.14) 1px,transparent 1px);
  background-size:60px 60px;
  animation:gridDrift 20s linear infinite}
@keyframes gridDrift{0%{transform:translate(0,0)}100%{transform:translate(60px,60px)}}
/* Dot grid + glow spots */
#loginPage::after{content:'';position:absolute;inset:0;pointer-events:none;
  background:
    radial-gradient(circle 2px at center,rgba(120,190,255,.4) 1px,transparent 2px),
    radial-gradient(ellipse 700px 550px at 75% 12%,rgba(59,130,246,.22),transparent 70%),
    radial-gradient(ellipse 550px 450px at 12% 78%,rgba(99,102,241,.16),transparent 70%),
    radial-gradient(ellipse 400px 350px at 55% 45%,rgba(139,92,246,.12),transparent 70%);
  background-size:60px 60px,100% 100%,100% 100%,100% 100%;
  background-position:30px 30px,0 0,0 0,0 0;
  animation:dotPulse 5s ease-in-out infinite alternate}
@keyframes dotPulse{0%{opacity:.6}100%{opacity:1}}

/* Floating orbs */
.login-orb{position:absolute;border-radius:50%;pointer-events:none;filter:blur(50px);animation:orbFloat ease-in-out infinite alternate}
.login-orb-1{width:400px;height:400px;background:radial-gradient(circle,rgba(59,130,246,.38),transparent 65%);top:-8%;right:8%;animation-duration:9s}
.login-orb-2{width:300px;height:300px;background:radial-gradient(circle,rgba(99,102,241,.28),transparent 65%);bottom:2%;left:5%;animation-duration:13s;animation-delay:-4s}
.login-orb-3{width:220px;height:220px;background:radial-gradient(circle,rgba(139,92,246,.22),transparent 65%);top:32%;left:25%;animation-duration:8s;animation-delay:-2s}
.login-orb-4{width:280px;height:280px;background:radial-gradient(circle,rgba(56,189,248,.18),transparent 65%);top:58%;right:18%;animation-duration:11s;animation-delay:-6s}
@keyframes orbFloat{0%{transform:translate(0,0) scale(1)}25%{transform:translate(20px,-25px) scale(1.08)}50%{transform:translate(-15px,20px) scale(.93)}75%{transform:translate(25px,12px) scale(1.04)}100%{transform:translate(-8px,-14px) scale(1)}}

/* Floating light lines */
.login-line{position:absolute;pointer-events:none;opacity:0;animation:lineShoot linear infinite}
.login-line-1{width:260px;height:1.5px;background:linear-gradient(90deg,transparent,rgba(79,110,247,.55),rgba(120,180,255,.3),transparent);top:18%;left:-260px;animation-duration:6s;animation-delay:0s}
.login-line-2{width:200px;height:1.5px;background:linear-gradient(90deg,transparent,rgba(99,102,241,.5),rgba(139,170,255,.25),transparent);top:55%;left:-200px;animation-duration:8s;animation-delay:-3s}
.login-line-3{width:300px;height:1.5px;background:linear-gradient(90deg,transparent,rgba(139,92,246,.45),transparent);top:78%;left:-300px;animation-duration:10s;animation-delay:-7s}
.login-line-4{width:350px;height:1.5px;background:linear-gradient(90deg,transparent,rgba(56,189,248,.4),rgba(100,200,255,.2),transparent);top:40%;left:-350px;animation-duration:7s;animation-delay:-5s}
.login-line-v{width:1.5px;height:220px;background:linear-gradient(180deg,transparent,rgba(79,110,247,.4),rgba(120,180,255,.2),transparent)}
.login-line-5{top:-220px;left:20%;animation-duration:9s;animation-delay:-2s}
.login-line-6{top:-220px;left:65%;animation-duration:12s;animation-delay:-8s}
@keyframes lineShoot{0%{transform:translateX(-100%);opacity:0}5%{opacity:1}90%{opacity:1}100%{transform:translateX(calc(100vw + 100%));opacity:0}}

/* Vertical line animation */
.login-line-v{animation-name:lineShootV}
@keyframes lineShootV{0%{transform:translateY(-100%);opacity:0}5%{opacity:1}90%{opacity:1}100%{transform:translateY(calc(100vh + 100%));opacity:0}}

/* Diagonal light rings */
.login-ring{position:absolute;pointer-events:none;border-radius:50%;border:1.5px solid transparent;animation:ringDiagonal linear infinite}
.login-ring-1{width:180px;height:180px;border-color:rgba(79,110,247,.3);box-shadow:0 0 30px -8px rgba(59,130,246,.2),inset 0 0 30px -8px rgba(59,130,246,.12);top:-180px;left:-180px;animation-duration:14s;animation-delay:0s}
.login-ring-2{width:120px;height:120px;border-color:rgba(99,102,241,.28);box-shadow:0 0 24px -6px rgba(99,102,241,.18),inset 0 0 24px -6px rgba(99,102,241,.1);top:-120px;right:-120px;animation-name:ringDiagonalR;animation-duration:18s;animation-delay:-6s}
.login-ring-3{width:90px;height:90px;border-color:rgba(139,92,246,.25);box-shadow:0 0 18px -5px rgba(139,92,246,.15),inset 0 0 18px -5px rgba(139,92,246,.08);top:-90px;left:40%;animation-duration:16s;animation-delay:-3s}
.login-ring-4{width:150px;height:150px;border-color:rgba(56,189,248,.22);box-shadow:0 0 28px -7px rgba(56,189,248,.16),inset 0 0 28px -7px rgba(56,189,248,.08);bottom:-150px;right:-150px;animation-name:ringDiagonalUp;animation-duration:20s;animation-delay:-9s}
.login-ring-5{width:70px;height:70px;border-color:rgba(120,180,255,.3);box-shadow:0 0 16px -4px rgba(120,180,255,.2),inset 0 0 16px -4px rgba(120,180,255,.1);top:-70px;left:20%;animation-duration:12s;animation-delay:-5s}
@keyframes ringDiagonal{0%{transform:translate(0,0) rotate(0deg) scale(.6);opacity:0}8%{opacity:1}85%{opacity:.6}100%{transform:translate(100vw,100vh) rotate(180deg) scale(1.2);opacity:0}}
@keyframes ringDiagonalR{0%{transform:translate(0,0) rotate(0deg) scale(.7);opacity:0}8%{opacity:1}85%{opacity:.5}100%{transform:translate(-100vw,100vh) rotate(-180deg) scale(1.3);opacity:0}}
@keyframes ringDiagonalUp{0%{transform:translate(0,0) rotate(0deg) scale(.6);opacity:0}8%{opacity:.9}85%{opacity:.4}100%{transform:translate(-80vw,-100vh) rotate(160deg) scale(1.1);opacity:0}}

.login-box{background:linear-gradient(145deg,#f7f9ff,#eef2fc);border:1px solid rgba(79,110,247,.1);border-radius:22px;padding:48px 44px 40px;width:430px;max-width:92%;position:relative;z-index:1;
  box-shadow:
    8px 8px 24px rgba(0,0,0,.18),
    -4px -4px 16px rgba(200,215,255,.12),
    0 0 0 1px rgba(79,110,247,.08),
    0 0 50px -10px rgba(59,130,246,.18),
    0 32px 70px -16px rgba(0,0,0,.22),
    inset 0 2px 0 rgba(255,255,255,.9),
    inset 0 -2px 4px rgba(79,110,247,.04),
    inset 2px 0 4px rgba(59,130,246,.03),
    inset -2px 0 4px rgba(167,139,250,.02);
  transform:perspective(1200px) rotateX(1deg) rotateY(-1deg);
  animation:loginBoxIn .7s cubic-bezier(.16,1,.3,1);
  text-rendering:optimizeLegibility;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
@keyframes loginBoxIn{from{opacity:0;transform:perspective(1200px) rotateX(3deg) rotateY(-2deg) translateY(28px) scale(.95)}to{opacity:1;transform:perspective(1200px) rotateX(1deg) rotateY(-1deg) translateY(0) scale(1)}}
.login-box::before{content:'';position:absolute;top:-1px;left:28px;right:28px;height:3px;background:linear-gradient(90deg,rgba(79,110,247,.7),rgba(123,147,249,.7),rgba(167,139,250,.7));border-radius:0 0 2px 2px;box-shadow:0 0 12px rgba(79,110,247,.3)}
.login-box::after{content:'';position:absolute;top:0;left:0;right:0;height:40%;border-radius:22px 22px 0 0;background:linear-gradient(180deg,rgba(79,110,247,.06) 0%,transparent 100%);pointer-events:none}
.login-box h1{font-size:20px;font-weight:700;color:#0a0f1e;margin-bottom:6px;letter-spacing:-.03em;-webkit-font-smoothing:antialiased}
.login-box .subtitle{margin-bottom:30px;color:rgba(50,60,90,.55);font-size:13px;font-weight:500}
.login-box .form-group{margin-bottom:18px}
.login-box label{display:block;margin-bottom:8px;font-size:11px;color:rgba(30,40,70,.92);font-weight:600;text-transform:uppercase;letter-spacing:.08em;-webkit-font-smoothing:antialiased}
.login-box input{width:100%;padding:12px 14px;border:1.5px solid rgba(79,110,247,.12);border-radius:var(--r-sm);font-size:14px;font-family:inherit;transition:all .2s var(--ease);background:#fff;color:#0a0f1e;
  box-shadow:inset 2px 2px 4px rgba(0,0,0,.04),inset -1px -1px 3px rgba(200,215,255,.06);-webkit-font-smoothing:antialiased}
.login-box input::placeholder{color:rgba(142,153,180,.4)}
.login-box input:focus{outline:none;border-color:rgba(79,110,247,.4);box-shadow:0 0 0 3px rgba(79,110,247,.1),inset 2px 2px 4px rgba(0,0,0,.02),inset -1px -1px 3px rgba(200,215,255,.04);background:#fff}
.login-btn{width:100%;padding:12px;background:linear-gradient(135deg,#4f6ef7,#7b93f9);color:#fff;border:none;border-radius:var(--r-sm);font-size:14px;cursor:pointer;transition:all .25s var(--ease);font-family:inherit;font-weight:700;letter-spacing:.04em;margin-top:8px;box-shadow:0 2px 4px rgba(79,110,247,.15),0 4px 20px rgba(59,130,246,.25)}
.login-btn:hover{background:linear-gradient(135deg,#3b5af5,#6b83f7);box-shadow:0 4px 8px rgba(79,110,247,.2),0 8px 32px rgba(59,130,246,.35);transform:translateY(-1px)}
.login-btn:active{transform:translateY(0);box-shadow:0 1px 2px rgba(79,110,247,.15)}
.login-error{color:#e5484d;font-size:13px;margin-top:14px;min-height:20px;font-weight:500}
.login-toggle{margin-top:22px;font-size:13px;color:rgba(75,86,114,.4)}
.login-toggle a{color:rgba(79,110,247,.85);cursor:pointer;text-decoration:none;font-weight:600}
.login-toggle a:hover{color:var(--accent);text-decoration:underline}

/* ── Header ── */
.header{background:rgba(255,255,255,.92);border-bottom:1px solid var(--border);padding:0 28px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px);
  box-shadow:0 1px 4px rgba(15,23,41,.04)}
.header h2{font-size:14px;font-weight:700;color:var(--text);letter-spacing:-.01em;display:flex;align-items:center;gap:10px}
.header h2::before{content:'';display:inline-block;width:4px;height:16px;background:linear-gradient(180deg,var(--accent),var(--accent2));border-radius:2px}
.header-right{display:flex;align-items:center;gap:10px}
.header-right span{font-size:13px;color:var(--text2);font-weight:500}
.hdr-btn{background:var(--surface2);color:var(--text2);border:1px solid var(--border);padding:6px 14px;border-radius:var(--r-sm);cursor:pointer;font-size:12px;font-family:inherit;transition:all .15s var(--ease);font-weight:500}
.hdr-btn:hover{border-color:var(--text4);color:var(--text);background:var(--surface)}

/* ── Buttons ── */
.btn{padding:7px 16px;border:none;border-radius:var(--r-sm);cursor:pointer;font-size:13px;font-family:inherit;transition:all .15s var(--ease);display:inline-flex;align-items:center;gap:5px;font-weight:600;letter-spacing:0}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 2px 8px rgba(79,110,247,.2)}
.btn-primary:hover{box-shadow:0 4px 16px rgba(79,110,247,.3)}
.btn-success{background:var(--success);color:#fff;box-shadow:0 2px 8px rgba(48,164,108,.15)}
.btn-success:hover{box-shadow:0 4px 16px rgba(48,164,108,.25)}
.btn-danger{background:var(--danger);color:#fff;box-shadow:0 2px 8px rgba(229,72,77,.15)}
.btn-danger:hover{box-shadow:0 4px 16px rgba(229,72,77,.25)}
.btn-warn{background:var(--warn);color:#fff}
.btn-ghost{background:var(--surface);color:var(--text2);border:1px solid var(--border);font-weight:500}
.btn-ghost:hover{background:var(--surface2);color:var(--text);border-color:var(--text4)}
.btn-sm{padding:5px 11px;font-size:12px;border-radius:6px}
.btn-lg{padding:10px 28px;font-size:14px}

/* ── Kanban Grid ── */
.kanban-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:20px;padding:30px 34px}
.kanban-add-card{background:var(--surface);border:1.5px dashed var(--border);border-radius:var(--r);display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;cursor:pointer;transition:all .25s var(--ease);color:var(--text4);gap:10px;position:relative;
  box-shadow:5px 5px 14px rgba(15,23,41,.08),-3px -3px 10px rgba(255,255,255,.7)}
.kanban-add-card:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-bg);box-shadow:6px 6px 18px rgba(15,23,41,.1),-3px -3px 12px rgba(255,255,255,.8),0 0 0 4px var(--accent-bg);transform:translateY(-2px)}
.kanban-add-card .add-icon{width:48px;height:48px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:300;transition:all .25s var(--ease);
  box-shadow:inset 2px 2px 5px rgba(15,23,41,.06),inset -2px -2px 4px rgba(255,255,255,.6)}
.kanban-add-card:hover .add-icon{background:var(--accent-bg2);color:var(--accent);
  box-shadow:3px 3px 8px rgba(79,110,247,.12),-2px -2px 6px rgba(255,255,255,.5)}
.kanban-add-card .add-text{font-size:13px;font-weight:600;letter-spacing:.01em}

.kanban-board-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;cursor:default;transition:all .25s var(--ease);position:relative;display:flex;align-items:center;
  box-shadow:
    6px 6px 18px rgba(15,23,41,.09),
    -4px -4px 12px rgba(255,255,255,.8),
    inset 0 1px 0 rgba(255,255,255,.9),
    inset 0 -1px 2px rgba(15,23,41,.03)}
.kanban-board-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#ef4444,#f59e0b,#22c55e,#3b82f6,#8b5cf6);opacity:0;transition:opacity .25s var(--ease)}
.kanban-board-card:hover{border-color:rgba(79,110,247,.2);box-shadow:8px 8px 24px rgba(15,23,41,.12),-4px -4px 14px rgba(255,255,255,.9),0 0 20px rgba(59,130,246,.08),inset 0 1px 0 rgba(255,255,255,.95);transform:translateY(-4px)}
.kanban-board-card:hover::after{opacity:1}
.kb-head{padding:22px 22px 18px;flex:1;min-width:0}
.kb-head h3{font-size:16px;font-weight:700;margin-bottom:12px;line-height:1.35;letter-spacing:-.01em;background:linear-gradient(90deg,#ef4444,#f59e0b,#22c55e,#3b82f6,#8b5cf6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.kb-arrow{display:flex;align-items:center;justify-content:center;width:48px;height:48px;margin:0 18px 0 0;border-radius:50%;border:2.5px solid transparent;background-image:linear-gradient(var(--surface),var(--surface)),linear-gradient(135deg,#ef4444,#f59e0b,#22c55e,#3b82f6,#8b5cf6);background-origin:border-box;background-clip:padding-box,border-box;cursor:pointer;transition:all .25s var(--ease);flex-shrink:0}
.kb-arrow:hover{transform:scale(1.12);box-shadow:0 0 18px rgba(139,92,246,.18)}
.kb-arrow svg{width:20px;height:20px;stroke:url(#rainbowGrad);fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
.kb-meta{display:flex;gap:18px;font-size:12px;color:var(--text3)}
.kb-meta span{display:flex;align-items:center;gap:5px;font-weight:500}
.kb-meta .num{color:var(--accent);font-weight:700;font-size:14px}

/* ── Board Detail ── */
.board-detail{padding:28px 32px;max-width:1100px;margin:0 auto}
.board-back{display:inline-flex;align-items:center;gap:5px;color:var(--text3);cursor:pointer;font-size:13px;margin-bottom:16px;font-weight:500;transition:all .15s var(--ease);padding:4px 0}
.board-back:hover{color:var(--accent)}
.board-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;padding-bottom:16px;border-bottom:1px solid var(--border)}
.board-header h3{font-size:22px;font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:10px;background:linear-gradient(90deg,#ef4444,#f59e0b,#22c55e,#3b82f6,#8b5cf6,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

.board-bottom-actions{margin-top:32px;padding:18px 0;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* ── Tabs ── */
.tab-bar{display:flex;gap:4px;margin-bottom:22px;background:var(--surface2);border-radius:var(--r-sm);padding:4px;border:1px solid var(--border)}
.tab-item{padding:8px 20px;cursor:pointer;font-size:13px;font-weight:600;color:var(--text3);border-radius:6px;transition:all .15s var(--ease);letter-spacing:0}
.tab-item:hover{color:var(--text2);background:rgba(255,255,255,.5)}
.tab-item.active{color:var(--accent);background:var(--surface);box-shadow:var(--shadow-sm)}

/* ── Card ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:14px;transition:box-shadow .15s var(--ease);
  box-shadow:4px 4px 12px rgba(15,23,41,.06),-2px -2px 8px rgba(255,255,255,.7),inset 0 1px 0 rgba(255,255,255,.8)}
.card:hover{box-shadow:6px 6px 16px rgba(15,23,41,.09),-3px -3px 10px rgba(255,255,255,.8)}

/* ── Table ── */
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--surface2);padding:10px 14px;text-align:left;font-weight:600;color:var(--text3);border-bottom:1px solid var(--border);white-space:nowrap;font-size:11px;text-transform:uppercase;letter-spacing:.06em}
td{padding:10px 14px;border-bottom:1px solid var(--divider);vertical-align:middle;color:var(--text);font-weight:400}
tr:last-child td{border-bottom:none}

/* ── Forms ── */
.form-row{display:flex;gap:10px;margin-bottom:12px;align-items:flex-end;flex-wrap:wrap}
.form-row .form-group{flex:1;min-width:130px}

.form-group textarea{resize:vertical;min-height:64px;line-height:1.5}
.form-group input:focus,.form-group textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-bg)}
.form-group input::placeholder,.form-group textarea::placeholder{color:var(--text4)}

/* ── Award Block ── */
.award-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:10px;overflow:hidden;transition:all .15s var(--ease);
  box-shadow:4px 4px 10px rgba(15,23,41,.06),-2px -2px 6px rgba(255,255,255,.6),inset 0 1px 0 rgba(255,255,255,.7)}
.award-block:hover{box-shadow:6px 6px 16px rgba(15,23,41,.1),-3px -3px 8px rgba(255,255,255,.7)}
.award-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;cursor:pointer;transition:all .15s var(--ease);border-bottom:1px solid transparent}
.award-header:hover{background:var(--surface2)}
.award-header.open{border-bottom-color:var(--divider)}
.award-header h4{font-size:14px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:8px;letter-spacing:-.01em}
.toggle-icon{transition:transform .2s var(--ease);font-size:8px;color:var(--text4);width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:4px;background:var(--surface2);
  box-shadow:inset 1px 1px 2px rgba(15,23,41,.06),inset -1px -1px 2px rgba(255,255,255,.5)}
.toggle-icon.open{transform:rotate(90deg);background:var(--accent-bg);color:var(--accent)}
.award-header-right{display:flex;align-items:center;gap:6px}
.award-count{font-size:12px;font-weight:400;color:var(--text4);margin-left:2px}
.award-body{padding:0 18px 14px;display:none}
.award-body.open{display:block}
.sub-item{background:var(--surface2);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:8px;border:1px solid var(--divider);transition:all .15s var(--ease);
  box-shadow:inset 2px 2px 4px rgba(15,23,41,.03),inset -1px -1px 3px rgba(255,255,255,.4)}
.sub-item:last-child{margin-bottom:0}
.sub-item:hover{border-color:var(--border);box-shadow:var(--shadow-sm)}
.sub-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.sub-dept{font-weight:600;font-size:13px;color:var(--text);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.cat-tag{display:inline-flex;align-items:center;padding:2px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s var(--ease);letter-spacing:.02em;user-select:none;border:1.5px solid transparent;flex-shrink:0}
.cat-tag:hover{transform:scale(1.06);box-shadow:0 2px 8px rgba(0,0,0,.08)}

.cat-personal{background:rgba(59,130,246,.1);color:#3b82f6;border-color:rgba(59,130,246,.25)}

/* ── Award Criteria Layout ── */
.award-content{display:flex;gap:0;border-top:1px solid var(--divider)}
.award-criteria{flex:0 0 220px;padding:16px 18px;border-right:1px solid var(--divider);background:var(--surface2);font-size:14px;color:var(--text2);line-height:1.8;overflow-y:auto;max-height:600px}
.award-criteria .criteria-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.award-criteria .criteria-label::before{content:'';display:inline-block;width:3px;height:10px;background:var(--accent);border-radius:2px}
.award-criteria .criteria-text{white-space:pre-wrap;word-break:break-word}
.award-criteria .criteria-empty{color:var(--text4);font-style:italic;font-size:13px}
.award-subs{flex:1;min-width:0;padding:14px 18px;overflow-y:auto;max-height:600px}
.award-content-wrap{display:flex;gap:0;align-items:stretch}
.criteria-side{flex:0 0 220px;padding:16px 20px;border-right:1px solid var(--divider);background:linear-gradient(180deg,rgba(79,110,247,.03) 0%,var(--surface2) 100%);font-size:14px;color:var(--text2);line-height:1.8;overflow-y:auto;max-height:none;position:relative;transition:background .2s;min-height:100%}
.criteria-side:hover{background:linear-gradient(180deg,rgba(79,110,247,.07) 0%,var(--surface2) 100%)}
.criteria-side .cl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:6px;justify-content:space-between}
.criteria-side .cl::before{content:'';display:inline-block;width:3px;height:10px;background:var(--accent);border-radius:2px}
.criteria-side .cl .ce-btn{font-size:14px;cursor:pointer;opacity:.45;transition:opacity .2s;padding:2px 4px;border-radius:4px;line-height:1;border:none;background:none}
.criteria-side:hover .cl .ce-btn{opacity:1}
.criteria-side .ct{white-space:pre-wrap;word-break:break-word}
.criteria-side .ce{color:var(--text4);font-style:italic;font-size:13px}
.criteria-side.editing{cursor:text;background:linear-gradient(180deg,rgba(79,110,247,.06) 0%,var(--surface2) 100%)}
.criteria-side .ct-edit{width:100%;min-height:160px;border:1px solid var(--accent);border-radius:var(--r-sm);padding:8px 10px;font-size:14px;line-height:1.8;color:var(--text2);background:rgba(255,255,255,.6);resize:vertical;font-family:inherit;outline:none}
.criteria-side .ct-edit:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(79,110,247,.15)}
.subs-side{flex:1;min-width:0;padding:14px 20px}
.sub-reason{color:var(--text2);font-size:13px;line-height:1.55}
.sub-actions{display:flex;gap:4px;flex-shrink:0}

/* ── Link Cell ── */
.link-cell{display:flex;align-items:center;gap:6px}
.link-text{font-size:11px;color:var(--accent);max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:var(--accent-bg);padding:4px 10px;border-radius:6px;cursor:pointer;transition:all .15s var(--ease);font-family:'DM Sans',monospace;font-weight:500}
.link-text:hover{background:var(--accent-bg2)}
.copy-btn{background:var(--accent-bg);color:var(--accent);border:none;padding:4px 10px;border-radius:6px;cursor:pointer;font-size:11px;font-family:inherit;transition:all .15s var(--ease);white-space:nowrap;font-weight:600}
.copy-btn:hover{background:var(--accent-bg2)}

/* ── Scoring Page ── */
#userPage{display:none}
.scoring-wrap{max-width:820px;margin:20px auto;padding:0 16px 80px}
.scoring-award{background:var(--surface);border:1px solid var(--border);border-radius:16px;margin-bottom:16px;overflow:hidden;
  box-shadow:5px 5px 14px rgba(15,23,41,.07),-3px -3px 8px rgba(255,255,255,.7),inset 0 1px 0 rgba(255,255,255,.9)}
.scoring-award-title{background:linear-gradient(135deg,#818cf8,#a78bfa,#7c3aed);color:#fff;padding:16px 24px;font-size:15px;font-weight:700;letter-spacing:.01em;border-bottom:1px solid rgba(129,140,248,.1)}
.scoring-award .award-content-wrap{display:flex;gap:0}
.scoring-award .criteria-side{flex:0 0 220px;padding:18px 20px;border-right:1px solid var(--divider);background:linear-gradient(180deg,rgba(129,140,248,.04) 0%,var(--surface2) 100%);font-size:14px;color:var(--text2);line-height:1.8;overflow-y:auto}
.scoring-award .criteria-side .cl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.scoring-award .criteria-side .cl::before{content:'';display:inline-block;width:3px;height:10px;background:var(--accent);border-radius:2px}
.scoring-award .criteria-side .ct{white-space:pre-wrap;word-break:break-word}
.scoring-award .criteria-side .ce{color:var(--text4);font-style:italic;font-size:13px}
.scoring-award .subs-side{flex:1;min-width:0;padding:10px 16px}
.scoring-sub{border-bottom:none;display:flex;gap:0;align-items:stretch;flex-wrap:wrap;transition:background .15s var(--ease);background-image:repeating-linear-gradient(90deg,rgba(129,140,248,.2) 0,rgba(129,140,248,.2) 10px,transparent 10px,transparent 22px);background-size:100% 1.5px;background-position:bottom;background-repeat:no-repeat no-repeat;padding-bottom:8px;margin-bottom:8px}
.scoring-sub:last-child{border-bottom:none}
.scoring-sub.unrated .sub-left{border-left:3px solid #ef4444}
.sub-left{flex:1;min-width:0;padding:18px 24px;background:#fff}
.sub-right{display:flex;align-items:center;padding:18px 24px;background:#fff}
.dept-name{font-weight:700;font-size:14px;color:var(--text);margin-bottom:6px;letter-spacing:-.01em}
.dept-reason{color:var(--text2);font-size:13px;line-height:1.6}
.star-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap}

/* ── Stars ── */
.stars{display:inline-flex;gap:4px;cursor:pointer;user-select:none;padding:5px 10px;border-radius:var(--r-sm);background:#fde8ee;border:1px solid #f5c6d4;transition:all .15s var(--ease)}
.stars:hover{border-color:#e8a0b8;background:#fbd5df}
.star{position:relative;width:28px;height:28px;cursor:pointer}
.star-bg{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:24px;line-height:1;color:#ef4444;-webkit-text-stroke:1px #ef4444;-webkit-text-fill-color:transparent}
.star-fg{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);font-size:24px;line-height:1;color:#ef4444}
.star-full .star-fg{clip-path:inset(0 0 0 0);-webkit-clip-path:inset(0 0 0 0)}
.star-half .star-fg{clip-path:inset(0 50% 0 0);-webkit-clip-path:inset(0 50% 0 0)}
.star-empty .star-fg{clip-path:inset(0 100% 0 0);-webkit-clip-path:inset(0 100% 0 0)}
.score-label{font-size:14px;color:#ef4444;font-weight:700;min-width:36px;font-variant-numeric:tabular-nums}
.score-label.none{color:var(--text4);font-weight:500}

/* ── Scoring Tip ── */
.scoring-tip{background:#f0f4ff;border:1px solid rgba(99,102,241,.1);border-radius:var(--r-sm);padding:14px 18px;margin-bottom:20px;font-size:12px;color:#4338ca;display:flex;align-items:center;gap:10px;line-height:1.5;font-weight:500}
.tip-icon{width:24px;height:24px;border-radius:50%;background:var(--warn);color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.tip-half{display:inline-block;width:16px;height:16px;position:relative;vertical-align:middle;margin:0 2px}
.tip-half::before{content:'★';font-size:16px;color:#ef4444;-webkit-text-stroke:0.8px #ef4444;-webkit-text-fill-color:transparent;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}
.tip-half::after{content:'★';font-size:16px;color:#ef4444;position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);clip-path:inset(0 50% 0 0);-webkit-clip-path:inset(0 50% 0 0)}
.tip-full{color:#ef4444;font-size:15px;vertical-align:middle;margin:0 2px}

/* ── Badges ── */
.badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.02em}
.badge-done{background:var(--success-bg);color:var(--success)}
.badge-progress{background:rgba(245,158,11,.08);color:#b45309}
.badge-pending{background:var(--warn-bg);color:var(--warn)}

/* ── Progress ── */
.progress-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin:10px 0;border:1px solid var(--divider)}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .5s var(--ease)}
.progress-text{font-size:13px;color:var(--text2);margin-top:6px;font-weight:500}

/* ── Results ── */
.rank-badge{display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:50%;font-weight:800;font-size:13px;color:#fff;position:relative;flex-shrink:0}
.rank-1{background:linear-gradient(145deg,#fbbf24,#f59e0b,#d97706);box-shadow:0 2px 8px rgba(245,158,11,.35),inset 0 1px 0 rgba(255,255,255,.3)}
.rank-1::after{content:'🥇';position:absolute;font-size:11px;top:-10px;right:-6px}
.rank-2{background:linear-gradient(145deg,#cbd5e1,#94a3b8,#64748b);box-shadow:0 2px 8px rgba(100,116,139,.3),inset 0 1px 0 rgba(255,255,255,.25)}
.rank-2::after{content:'🥈';position:absolute;font-size:11px;top:-10px;right:-6px}
.rank-3{background:linear-gradient(145deg,#d4a574,#c2884a,#a0622a);box-shadow:0 2px 8px rgba(162,98,42,.3),inset 0 1px 0 rgba(255,255,255,.2)}
.rank-3::after{content:'🥉';position:absolute;font-size:11px;top:-10px;right:-6px}
.rank-n{background:var(--surface2);color:var(--text4);border:1px solid var(--border);border-radius:8px;width:28px;height:28px;font-size:12px}
.rank-row-1 td{background:rgba(245,158,11,.04)!important}
.rank-row-2 td{background:rgba(148,163,184,.03)!important}
.rank-row-3 td{background:rgba(194,136,74,.03)!important}
.grayed td{color:var(--text4)!important}
.avg-val{font-weight:700;font-size:14px;color:var(--accent);font-variant-numeric:tabular-nums}
.avg-val.low{color:var(--text4)!important}

/* ── Scoring Progress ── */
.scoring-progress{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px 24px;margin-bottom:20px;display:flex;align-items:center;gap:20px;
  box-shadow:4px 4px 12px rgba(15,23,41,.06),-2px -2px 8px rgba(255,255,255,.7),inset 0 1px 0 rgba(255,255,255,.8)}
.scoring-progress .prog-info{flex:1;min-width:0}
.scoring-progress .prog-info .prog-label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:8px}
.scoring-progress .prog-info .prog-label .prog-num{color:var(--accent);font-weight:800;font-size:16px;font-variant-numeric:tabular-nums}
.scoring-progress .prog-bar{height:8px;background:var(--surface2);border-radius:4px;overflow:hidden;border:1px solid var(--divider)}
.scoring-progress .prog-fill{height:100%;border-radius:4px;transition:width .4s var(--ease);background:linear-gradient(90deg,#ef4444 0%,#f59e0b 30%,#22c55e 60%,#3b82f6 80%,#8b5cf6 100%)}
.scoring-progress .prog-pct{font-size:22px;font-weight:800;color:var(--accent);font-variant-numeric:tabular-nums;letter-spacing:-.02em;flex-shrink:0}

/* ── Submit Bar ── */
.submit-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.95);padding:14px 32px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;z-index:99;backdrop-filter:blur(12px);box-shadow:0 -2px 10px rgba(15,23,41,.04)}
.submit-bar .err{color:var(--danger);font-size:13px;font-weight:600}
.submit-bar .ok{color:var(--success);font-size:13px;font-weight:600}

/* ── Modal ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(15,23,41,.3);z-index:200;justify-content:center;align-items:center;backdrop-filter:blur(4px)}
.modal-overlay.show{display:flex}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:28px;width:500px;max-width:92%;max-height:80vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:modalIn .25s var(--ease)}
@keyframes modalIn{from{transform:translateY(16px) scale(.98);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.modal-box h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--border);letter-spacing:-.01em;display:flex;align-items:center;gap:8px}
.modal-box h3::before{content:'';display:inline-block;width:3px;height:14px;background:var(--accent);border-radius:2px}
.modal-box .form-group{margin-bottom:14px}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:20px}
.modal-preview{margin-top:12px;max-height:260px;overflow-y:auto}

/* ── Toast ── */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-8px);padding:10px 24px;border-radius:var(--r-sm);color:#fff;font-size:13px;z-index:300;opacity:0;transition:all .3s var(--ease);pointer-events:none;font-weight:600;box-shadow:var(--shadow-md);letter-spacing:.01em}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.t-err{background:var(--danger)}
.toast.t-ok{background:var(--success)}
.toast.t-info{background:var(--accent)}

@keyframes flashRed{0%,100%{box-shadow:none}30%,70%{box-shadow:0 0 0 3px rgba(229,72,77,.15)}}
.flash-red{animation:flashRed 1.2s var(--ease)}

.import-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center}

/* ── Loading ── */
#loadingPage{display:none;position:fixed;inset:0;background:#111c32;z-index:9999;justify-content:center;align-items:center;flex-direction:column;gap:16px}
#loadingPage .spinner{width:40px;height:40px;border:3px solid rgba(79,110,247,.2);border-top-color:#4f6ef7;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loadingPage .load-text{color:rgba(255,255,255,.7);font-size:14px;font-weight:500}

/* ── Empty State ── */
.empty-state{text-align:center;padding:40px;color:var(--text3);font-size:13px;font-weight:500}
.empty-state::before{content:'';display:block;width:48px;height:48px;margin:0 auto 12px;border-radius:50%;background:var(--surface2);border:1px solid var(--divider)}

/* ── Batch Copy Card ── */
.batch-card{background:var(--accent-bg);border:1px solid rgba(79,110,247,.1);border-radius:var(--r);padding:14px 20px;margin-bottom:14px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.batch-card span{font-size:12px;color:var(--text3);font-weight:500}

/* ── Section label ── */
.section-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:14px}

/* ── Responsive ── */
@media(max-width:768px){
  .kanban-grid{grid-template-columns:1fr;padding:14px 16px}
  .form-row{flex-direction:column}
  .scoring-sub{flex-direction:column}
  .star{width:24px;height:24px}
  .star-bg,.star-fg{font-size:20px!important}
  .tab-bar{overflow-x:auto}
  .tab-item{white-space:nowrap;padding:7px 14px;font-size:12px}
  .board-header{flex-direction:column;align-items:flex-start;gap:10px}
  .link-text{max-width:100px}
  .board-detail{padding:16px}
  .stars{gap:2px;padding:3px 6px}
  .award-content-wrap,.scoring-award .award-content-wrap{flex-direction:column}
  .criteria-side,.award-criteria,.scoring-award .criteria-side{flex:none;border-right:none;border-bottom:1px solid var(--divider);max-height:none;overflow-y:visible}
  .subs-side,.award-subs,.scoring-award .subs-side{padding:12px 14px}
}
</style>
</head>

<script>
const DB_KEY='scoreSys_v3';

// ===== Firebase 配置（多人协作必需）=====
// 请前往 https://console.firebase.google.com/ 创建项目：
//   1. 新建项目 → 添加 Web 应用 → 复制配置填入下方
//   2. 左侧 Firestore Database → 创建数据库 → 选择"测试模式"
// 配置完成后，系统将自动使用云端同步，其他人打开链接即可使用
const FIREBASE_CONFIG={
  apiKey:"",
  authDomain:"",
  projectId:"",
  storageBucket:"",
  messagingSenderId:"",
  appId:""
};

let firebaseApp,firestoreDb,firestoreDoc;
const USE_FIRESTORE=!!FIREBASE_CONFIG.apiKey;
if(USE_FIRESTORE){
  firebaseApp=firebase.initializeApp(FIREBASE_CONFIG);
  firestoreDb=firebase.firestore();
  firestoreDoc=firestoreDb.collection('scoreSys').doc('main');
}

let DB=normalizeDB({});
let _dbReady=false;
let _dbReadyResolve;
const dbReadyPromise=new Promise(r=>{_dbReadyResolve=r;});
let _syncTimer=null;
let _dirty=false;
let _unsubListener=null;

async function initDB(){
  if(!USE_FIRESTORE){
    DB=loadDBLocal();
    _dbReady=true;
    _dbReadyResolve();
    return;
  }
  try{
    const doc=await firestoreDoc.get();
    if(doc.exists){
      DB=normalizeDB(doc.data());
      localStorage.setItem(DB_KEY,JSON.stringify(DB));
    }else{
      const localData=loadDBLocal();
      DB=localData;
      await firestoreDoc.set(JSON.parse(JSON.stringify(DB)));
    }
  }catch(e){
    DB=loadDBLocal();
    console.warn('Firestore fetch failed, using localStorage:',e);
  }
  _unsubListener=firestoreDoc.onSnapshot(doc=>{
    if(doc.exists&&_dbReady&&!_dirty){
      const newData=normalizeDB(doc.data());
      if(JSON.stringify(newData)!==JSON.stringify(DB)){
        DB=newData;
        localStorage.setItem(DB_KEY,JSON.stringify(DB));
        refreshCurrentView();
      }
    }
  });
  _dbReady=true;
  _dbReadyResolve();
}

function loadDBLocal(){
  try{const d=localStorage.getItem(DB_KEY);if(d){return normalizeDB(JSON.parse(d));}}catch(e){}
  try{const old=localStorage.getItem('scoreSys_v2');if(old){const m=migrateFromV2(JSON.parse(old));localStorage.setItem(DB_KEY,JSON.stringify(m));return m;}}catch(e){}
  return normalizeDB({});
}

function loadDB(){return DB;}

function saveDB(){
  try{localStorage.setItem(DB_KEY,JSON.stringify(DB));}catch(e){}
  if(USE_FIRESTORE){syncToCloud();}
}

function syncToCloud(){
  if(!USE_FIRESTORE)return;
  _dirty=true;
  clearTimeout(_syncTimer);
  _syncTimer=setTimeout(async()=>{
    try{
      const clone=JSON.parse(JSON.stringify(DB));
      await firestoreDoc.set(clone);
    }catch(e){
      console.error('Firestore sync failed:',e);
    }finally{
      _dirty=false;
    }
  },400);
}

function refreshCurrentView(){
  const mode=localStorage.getItem('sessMode');
  if(mode==='admin'){
    renderKanban();
    if(currentBoardId&&document.getElementById('boardDetailView').style.display!=='none'){
      renderBoardDetail(currentBoardId);
    }
  }else if(mode==='user'){
    const user=getCurUser();
    const bid=localStorage.getItem('curBoardId');
    if(user&&bid){
      const board=DB.boards.find(b=>b.id===bid);
      if(board) renderScoring(user,board);
    }
  }
}
let currentBoardTab='awards';
let resultFilter='all';
let openAwards=new Set();
let importBoardId=null;

function migrateFromV2(old){
  return{admin:old.admin||{username:'admin',password:'admin123'},boards:[{id:uid(),name:'默认看板',awards:(old.awards||[]).map(a=>({...a,submissions:a.submissions||[]})),users:(old.users||[]).map(u=>({...u,token:generateToken()})),scores:old.scores||{},submitted:old.submitted||{}}]};
}
function normalizeDB(d){
  d.admin=d.admin||{username:'admin',password:'admin123'};
  if(!d.boards&&d.awards){
    d.boards=[{id:uid(),name:'默认看板',awards:(d.awards||[]).map(a=>({...a,submissions:a.submissions||[]})),users:(d.users||[]).map(u=>({...u,token:u.token||generateToken()})),scores:d.scores||{},submitted:d.submitted||{}}];
    delete d.awards;delete d.users;delete d.scores;delete d.submitted;
  }
  d.boards=d.boards||[];
  d.boards.forEach(b=>{b.name=b.name||'未命名看板';b.awards=b.awards||[];b.scores=b.scores||{};b.submitted=b.submitted||{};b.users=b.users||[];b.awards.forEach(a=>{if(!a.submissions)a.submissions=[];if(!a.criteria)a.criteria='';a.submissions.forEach(s=>{if(!s.category)s.category='个人奖';});});b.users.forEach(u=>{if(!u.token)u.token=generateToken();});});
  d._v=4;
  return d;
}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substring(2,10);}
async function sha256(str){const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');}
function hashPwd(pwd){return sha256(pwd);}
function isHashed(pwd){return/^[0-9a-f]{64}$/.test(pwd);}
async function migratePassword(pwd){return isHashed(pwd)?pwd:await sha256(pwd);}
function generateToken(){let a=new Uint32Array(8);crypto.getRandomValues(a);return Array.from(a,x=>x.toString(36)).join('');}

let _tt;
function toast(msg,type){
  const t=document.getElementById('toast');t.textContent=msg;
  t.className='toast show '+(type==='ok'?'t-ok':type==='err'?'t-err':'t-info');
  clearTimeout(_tt);_tt=setTimeout(()=>t.className='toast',2800);
}
function esc(s){const d=document.createElement('div');d.textContent=s||'';return d.innerHTML;}
function openModal(html){document.getElementById('modalBox').innerHTML=html;document.getElementById('modalOverlay').classList.add('show');}
function closeModal(){document.getElementById('modalOverlay').classList.remove('show');}

const SESS_TTL=2*60*60*1000;
function checkSession(){
  const t=localStorage.getItem('sessTime');
  if(t&&Date.now()-parseInt(t)>SESS_TTL){doLogout();toast('登录已过期，请重新登录','err');return false;}
  return true;
}
function touchSession(){localStorage.setItem('sessTime',String(Date.now()));}
let loginMode='user';
function toggleLoginMode(){
  loginMode=loginMode==='user'?'admin':'user';
  document.getElementById('loginSubtitle').textContent=loginMode==='admin'?'管理员登录':'请输入账号和密码登录';
  document.getElementById('loginToggleLink').textContent=loginMode==='admin'?'用户登录':'管理员登录';
  document.getElementById('loginErr').textContent='';
}
async function doLogin(){
  const u=document.getElementById('loginUser').value.trim(),p=document.getElementById('loginPass').value.trim();
  if(!u||!p){document.getElementById('loginErr').textContent='请输入账号和密码';return;}
  DB=loadDB();
  const inputHash=await sha256(p);
  if(loginMode==='admin'){
    const adminHash=await migratePassword(DB.admin.password);
    DB.admin.password=adminHash;saveDB();
    if(u===DB.admin.username&&inputHash===adminHash){localStorage.setItem('sessMode','admin');localStorage.setItem('sessTime',String(Date.now()));currentBoardId=null;currentBoardTab='awards';document.getElementById('kanbanView').style.display='block';document.getElementById('boardDetailView').style.display='none';showPage('adminPage');renderKanban();document.getElementById('loginErr').textContent='';}
    else{document.getElementById('loginErr').textContent='管理员账号或密码错误';}
  }else{
    for(const board of DB.boards){const user=board.users.find(x=>x.account===u);if(!user)continue;const storedHash=await migratePassword(user.password);user.password=storedHash;saveDB();if(inputHash===storedHash){localStorage.setItem('sessMode','user');localStorage.setItem('curBoardId',board.id);localStorage.setItem('curUserId',user.id);localStorage.setItem('sessTime',String(Date.now()));showPage('userPage');renderScoring(user,board);document.getElementById('loginErr').textContent='';return;}}
    document.getElementById('loginErr').textContent='账号或密码错误';
  }
}
function doLogout(){
  localStorage.removeItem('sessMode');localStorage.removeItem('curBoardId');localStorage.removeItem('curUserId');localStorage.removeItem('sessTime');
  showPage('loginPage');document.getElementById('loginUser').value='';document.getElementById('loginPass').value='';document.getElementById('loginErr').textContent='';
  loginMode='user';document.getElementById('loginSubtitle').textContent='请输入账号和密码登录';document.getElementById('loginToggleLink').textContent='管理员登录';currentBoardId=null;currentBoardTab='awards';resultFilter='all';
  document.getElementById('kanbanView').style.display='block';
  document.getElementById('boardDetailView').style.display='none';
}
function showPage(id){
  document.getElementById('loginPage').style.display=id==='loginPage'?'flex':'none';
  document.getElementById('adminPage').style.display=id==='adminPage'?'block':'none';
  document.getElementById('userPage').style.display=id==='userPage'?'block':'none';
}

// ── Kanban ──
function renderKanban(){
  DB=loadDB();const el=document.getElementById('kanbanGrid');
  let html='<div class="kanban-add-card" onclick="addBoard()"><div class="add-icon">+</div><div class="add-text">添加新看板</div></div>';
  DB.boards.forEach(b=>{
    html+=`<div class="kanban-board-card">
      <div class="kb-head">
        <h3>${esc(b.name)}</h3>
        <div class="kb-meta">
          <span><span class="num">${b.awards.length}</span> 奖项</span>
          <span><span class="num">${b.users.length}</span> 评分人</span>
        </div>
      </div>
      <div class="kb-arrow" onclick="openBoard('${b.id}')">
        <svg viewBox="0 0 24 24"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
      </div>
    </div>`;
  });
  el.innerHTML=html;
}
function addBoard(){
  openModal(`<h3>添加新看板</h3>
    <div class="form-group"><label>看板名称</label><input type="text" id="mBoardName" placeholder="例如：2026年H1奖项评定" autofocus></div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveBoard()">创建</button></div>`);
  setTimeout(()=>document.getElementById('mBoardName').focus(),120);
}
function saveBoard(){
  const name=document.getElementById('mBoardName').value.trim();if(!name){toast('请输入看板名称','err');return;}
  DB=loadDB();DB.boards.push({id:uid(),name,awards:[],users:[],scores:{},submitted:{}});
  saveDB();closeModal();renderKanban();toast('看板创建成功','ok');
}
function renameBoard(bid){
  DB=loadDB();const b=DB.boards.find(x=>x.id===bid);if(!b)return;
  openModal(`<h3>重命名看板</h3><div class="form-group"><label>看板名称</label><input type="text" id="mBoardName" value="${esc(b.name)}"></div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveRenameBoard('${bid}')">保存</button></div>`);
}
function saveRenameBoard(bid){
  const name=document.getElementById('mBoardName').value.trim();if(!name){toast('名称不能为空','err');return;}
  DB=loadDB();const b=DB.boards.find(x=>x.id===bid);if(b){b.name=name;saveDB();}
  closeModal();renderKanban();if(currentBoardId===bid)renderBoardDetail(bid);toast('修改成功','ok');
}
function delBoard(bid){
  DB=loadDB();const b=DB.boards.find(x=>x.id===bid);if(!b){return;}
  if(!confirm(`确定删除看板「${b.name}」？所有数据将一并删除，此操作不可撤销。`))return;
  DB=loadDB();DB.boards=DB.boards.filter(b=>b.id!==bid);saveDB();
  if(currentBoardId===bid){currentBoardId=null;showKanbanView();}else renderKanban();toast('看板已删除','ok');
}

// ── Board Detail ──
function openBoard(bid){
  currentBoardId=bid;currentBoardTab='awards';
  document.getElementById('kanbanView').style.display='none';
  document.getElementById('boardDetailView').style.display='block';
  renderBoardDetail(bid);
}
function closeBoard(){currentBoardId=null;openAwards.clear();document.getElementById('kanbanView').style.display='block';document.getElementById('boardDetailView').style.display='none';renderKanban();}
function showKanbanView(){document.getElementById('kanbanView').style.display='block';document.getElementById('boardDetailView').style.display='none';openAwards.clear();renderKanban();}
function renderBoardDetail(bid){
  DB=loadDB();const b=DB.boards.find(x=>x.id===bid);if(!b){closeBoard();return;}
  const el=document.getElementById('boardDetailContent');
  el.innerHTML=`
    <div class="board-back" onclick="closeBoard()">← 返回看板列表</div>
    <div class="board-header">
      <h3>${esc(b.name)}</h3>
    </div>
    <div class="tab-bar">
      <div class="tab-item" data-tab="awards" onclick="switchBoardTab('awards')">奖项管理</div>
      <div class="tab-item" data-tab="users" onclick="switchBoardTab('users')">用户管理</div>
      <div class="tab-item" data-tab="status" onclick="switchBoardTab('status')">评分状态</div>
      <div class="tab-item" data-tab="results" onclick="switchBoardTab('results')">评分结果</div>
    </div>
    <div id="boardTabContent"></div>
    <div class="board-bottom-actions">
      <button class="btn btn-ghost" onclick="renameBoard('${bid}')">重命名看板</button>
      <button class="btn btn-danger" onclick="delBoard('${bid}')">删除看板</button>
    </div>`;
  document.querySelectorAll('.tab-item[data-tab]').forEach(t=>{t.classList.toggle('active',t.dataset.tab===currentBoardTab);});
  renderBoardTabContent();
  openAwards.forEach(aid=>{
    const body=document.getElementById('ab-'+aid),icon=document.getElementById('ti-'+aid),header=document.getElementById('ah-'+aid);
    if(body){body.classList.add('open');icon.classList.add('open');header.classList.add('open');}
  });
}
function switchBoardTab(tab){
  currentBoardTab=tab;
  if(tab==='results')resultFilter='all';
  if(tab!=='awards')openAwards.clear();
  document.querySelectorAll('.tab-item[data-tab]').forEach(t=>{t.classList.toggle('active',t.dataset.tab===tab);});
  renderBoardTabContent();
}
function renderBoardTabContent(){
  const el=document.getElementById('boardTabContent');if(!el)return;
  if(currentBoardTab==='awards')renderBoardAwards(el);
  else if(currentBoardTab==='users')renderBoardUsers(el);
  else if(currentBoardTab==='status')renderBoardStatus(el);
  else if(currentBoardTab==='results')renderBoardResults(el);
}

// ── Awards ──
function getBoard(bid){DB=loadDB();return DB.boards.find(x=>x.id===(bid||currentBoardId));}
function renderBoardAwards(el){
  const b=getBoard();if(!b)return;
  let html=`<div class="import-bar">
    <button class="btn btn-primary" onclick="addAwardBoard()">+ 添加奖项</button>
    <button class="btn btn-ghost" onclick="triggerImport()">导入 Excel</button>
    <button class="btn btn-ghost" onclick="downloadTemplate()">下载模板</button>
  </div>`;
  if(!b.awards.length){html+='<div class="card empty-state">暂无奖项，请添加或导入</div>';}
  else{
    b.awards.forEach(a=>{
      const criteriaText=a.criteria||'';
      const sorted=[...a.submissions].sort((x,y)=>{
        const cx=x.category||'个人奖',cy=y.category||'个人奖';
        if(cx===cy)return 0;return cx==='个人奖'?-1:1;
      });
      const personals=sorted.filter(s=>(s.category||'个人奖')==='个人奖');
      const teams=sorted.filter(s=>(s.category||'个人奖')==='团队奖');
      html+=`<div class="award-block">
        <div class="award-header" id="ah-${a.id}" onclick="toggleAwardBody('${a.id}')">
          <h4><span class="toggle-icon" id="ti-${a.id}">▶</span> ${esc(a.name)} <span class="award-count">${a.submissions.length} 个提报</span></h4>
          <div class="award-header-right">
            <button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();editAwardB('${a.id}')">修改</button>
            <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();delAwardB('${a.id}')">删除</button>
          </div>
        </div>
        <div class="award-body" id="ab-${a.id}">
          <div class="award-content-wrap">
            <div class="criteria-side" data-aid="${a.id}">
              <div class="cl"><span>评分标准</span><span class="ce-btn" onclick="event.stopPropagation();editCriteriaInline('${a.id}',this.closest('.criteria-side'))">✏️</span></div>
              ${criteriaText?`<div class="ct">${esc(criteriaText)}</div>`:`<div class="ce">点击设置评分标准</div>`}
            </div>
            <div class="subs-side">
              ${a.submissions.length===0?'<div style="color:var(--text4);font-size:12px;padding:2px 0">暂无提报项</div>':''}
              ${personals.length?`<div class="cat-sep">👤 个人奖</div>`:''}
              ${personals.map(s=>renderSubItem(a.id,s)).join('')}
              ${teams.length?`<div class="cat-sep" style="margin-top:${personals.length?'10':'4'}px">👥 团队奖</div>`:''}
              ${teams.map(s=>renderSubItem(a.id,s)).join('')}
              <div style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--divider)">
                <button class="btn btn-sm btn-primary" onclick="addSubB('${a.id}')">+ 添加提报</button>
              </div>
            </div>
          </div>
        </div>
      </div>`;
    });
  }
  el.innerHTML=html;
}
function renderSubItem(aid,s){
  const cat=s.category||'个人奖';
  const catCls=cat==='个人奖'?'cat-personal':'cat-team';
  return`<div class="sub-item">
    <div class="sub-top">
      <span class="sub-dept">${esc(s.department)} <span class="cat-tag ${catCls}" onclick="toggleSubCat('${aid}','${s.id}')" title="点击切换类别">${cat}</span></span>
      <div class="sub-actions">
        <button class="btn btn-sm btn-ghost" onclick="editSubB('${aid}','${s.id}')">修改</button>
        <button class="btn btn-sm btn-danger" onclick="delSubB('${aid}','${s.id}')">删除</button>
      </div>
    </div>
    <div class="sub-reason">${esc(s.reason)}</div>
  </div>`;
}
function toggleSubCat(aid,sid){
  DB=loadDB();const b=getBoard();if(!b)return;
  const a=b.awards.find(x=>x.id===aid);if(!a)return;
  const s=a.submissions.find(x=>x.id===sid);if(!s)return;
  s.category=s.category==='团队奖'?'个人奖':'团队奖';
  saveDB();renderBoardDetail(currentBoardId);toast('已切换为'+s.category,'ok');
}
function editCriteriaInline(aid,el){
  if(el.classList.contains('editing'))return;
  el.classList.add('editing');
  DB=loadDB();const b=getBoard();if(!b)return;const a=b.awards.find(x=>x.id===aid);if(!a)return;
  const oldText=a.criteria||'';
  el.innerHTML=`<div class="cl"><span>评分标准</span><span class="ce-btn" onclick="event.stopPropagation();">✏️</span></div><textarea class="ct-edit" id="ce-${aid}">${esc(oldText)}</textarea>
    <div style="display:flex;gap:6px;margin-top:8px">
      <button class="btn btn-sm btn-primary" onclick="event.stopPropagation();saveCriteriaInline('${aid}')">保存</button>
      <button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();cancelCriteriaInline('${aid}')">取消</button>
    </div>`;
  const ta=document.getElementById('ce-'+aid);
  ta.focus();ta.setSelectionRange(ta.value.length,ta.value.length);
  ta.addEventListener('keydown',function(e){
    if(e.key==='Escape'){e.stopPropagation();cancelCriteriaInline(aid);}
    if(e.key==='Enter'&&(e.ctrlKey||e.metaKey)){e.stopPropagation();saveCriteriaInline(aid);}

function triggerImport(){importBoardId=currentBoardId;document.getElementById('fileInput').click();}
function handleFileSelect(e){
  const file=e.target.files[0];if(!file)return;e.target.value='';const bid=importBoardId||currentBoardId;
  if(!bid){toast('请先进入一个看板','err');return;}
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      let rows;
      if(typeof XLSX!=='undefined'&&(file.name.endsWith('.xlsx')||file.name.endsWith('.xls'))){
        const wb=XLSX.read(ev.target.result,{type:'array'});rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});
      }else{rows=new TextDecoder().decode(ev.target.result).split(/\r?\n/).filter(r=>r.trim()).map(r=>parseCSVLine(r));}
      if(!rows||rows.length<2){toast('文件内容为空或格式不正确','err');return;}
      const header=rows[0].map(h=>String(h??'').trim());
      const cA=header.findIndex(h=>h.includes('奖项')),cD=header.findIndex(h=>h.includes('部门')),cR=header.findIndex(h=>h.includes('原因'));
      const cC=header.findIndex(h=>/类型|奖项类型|类别|分类|个人|团队/.test(h));
      const cCr=header.findIndex(h=>/评分标准|标准|评审标准|评选标准/.test(h));
      if(cA===-1||cD===-1||cR===-1){toast('表头需包含"奖项名称"、"提报部门"、"提报原因"','err');return;}
      const dr=rows.slice(1).filter(r=>r.length>=3&&r[cA]);
      if(!dr.length){toast('未找到有效数据行','err');return;}
      let p='<table><thead><tr><th>奖项名称</th><th>提报部门</th><th>提报原因</th><th>类型</th>'+(cCr!==-1?'<th>评分标准</th>':'')+'</tr></thead><tbody>';
      dr.slice(0,20).forEach(r=>{
        const rawCat=cC!==-1?String(r[cC]??'').trim():'';
        const cat=parseCategory(rawCat);
        const rawCr=cCr!==-1?String(r[cCr]??'').trim():'';
        p+=`<tr><td>${esc(String(r[cA]||''))}</td><td>${esc(String(r[cD]||''))}</td><td style="max-width:240px;white-space:normal">${esc(String(r[cR]||''))}</td><td><span class="cat-tag ${cat==='个人奖'?'cat-personal':'cat-team'}">${cat}</span></td>`+(cCr!==-1?`<td style="max-width:200px;white-space:normal;font-size:11px;color:var(--text3)">${esc(rawCr.substring(0,60))}${rawCr.length>60?'...':''}</td>`:'')+`</tr>`;
      });
      if(dr.length>20)p+=`<tr><td colspan="${cCr!==-1?5:4}" style="text-align:center;color:var(--text4)">...共${dr.length}行</td></tr>`;
      p+='</tbody></table>';
      const hasCriteria=cCr!==-1;
      openModal(`<h3>导入预览（共${dr.length}条）</h3><div class="modal-preview">${p}</div>
        <div style="background:var(--danger-bg);border:1px solid rgba(229,72,77,.15);border-radius:var(--r-sm);padding:12px 16px;font-size:13px;color:var(--danger);margin-top:10px;font-weight:500;line-height:1.6">
          ⚠️ 导入后将<strong>覆盖当前看板的所有奖项和提报数据</strong>，原有评分记录也将一并清除。此操作不可撤销，请确认无误后再导入。
        </div>
        <div style="font-size:12px;color:var(--text3);margin-top:8px;font-weight:500;line-height:1.6">${cC===-1?'⚠️ 未检测到"类型"列，默认归为个人奖。表头添加"类型"列可自动识别。':'✅ 已自动识别"类型"列，个人奖/团队奖将自动归类'}${hasCriteria?' · ✅ 已识别"评分标准"列，将按奖项自动提取':' · ℹ️ 未检测到"评分标准"列，可在导入后手动设置'}</div>
        <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-danger" onclick="confirmImport()">确认覆盖导入</button></div>`);
      window._importData={bid,cA,cD,cR,cC,cCr,dr};
    }catch(err){toast('文件解析失败: '+err.message,'err');}
  };reader.readAsArrayBuffer(file);
}
function parseCSVLine(l){const r=[];let c='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(q){if(ch==='"'&&l[i+1]==='"'){c+='"';i++}else if(ch==='"'){q=false}else{c+=ch}}else{if(ch==='"'){q=true}else if(ch===','||ch==='\t'){r.push(c);c=''}else{c+=ch}}}r.push(c);return r;}
function parseCategory(raw){
  if(!raw)return'个人奖';
  const s=raw.replace(/\s/g,'');
  if(/团队|团体|集体|小组|team|group/i.test(s))return'团队奖';
  if(/个人|单人|individual/i.test(s))return'个人奖';
  return'个人奖';
}
function confirmImport(){
  try{
    if(!window._importData){toast('导入数据丢失，请重新选择文件','err');return;}
    const{bid,cA,cD,cR,cC,cCr,dr}=window._importData;
    DB=loadDB();const b=DB.boards.find(x=>x.id===bid);if(!b){toast('看板不存在','err');return;}
    // Overwrite: clear all existing awards, scores, submitted status
    b.awards=[];b.scores={};b.submitted={};
    // Collect criteria per award name (first non-empty value)
    const criteriaMap={};
    if(cCr!==-1){dr.forEach(r=>{const an=String(r[cA]??'').trim(),cr=String(r[cCr]??'').trim();if(an&&cr&&!criteriaMap[an])criteriaMap[an]=cr;});}
    let n=0;dr.forEach(r=>{
      const an=String(r[cA]??'').trim(),dept=String(r[cD]??'').trim(),reason=String(r[cR]??'').trim();
      if(!an||!dept)return;let award=b.awards.find(a=>a.name===an);
      if(!award){award={id:uid(),name:an,criteria:criteriaMap[an]||'',submissions:[]};b.awards.push(award);}
      const rawCat=cC!==-1?String(r[cC]??'').trim():'';
      const cat=parseCategory(rawCat);
      award.submissions.push({id:uid(),department:dept,reason:reason||'未填写',category:cat});n++;
    });
    saveDB();closeModal();delete window._importData;
    if(currentBoardId===bid){renderBoardDetail(bid);}else{renderKanban();}
    toast(`已覆盖导入 ${n} 条提报，原有数据已清除`,'ok');
  }catch(e){toast('导入失败: '+e.message,'err');}
}

  html+=`</div>`;

    const filtered=resultFilter==='all'?award.submissions:award.submissions.filter(s=>(s.category||'个人奖')===resultFilter);
    if(!filtered.length)return;
    const stats=filtered.map(sub=>{
      const scores=scored.map(u=>scoreVal((b.scores[u.id]&&b.scores[u.id][sub.id])||0)).filter(s=>s>0);
      const avg=scores.length?scores.reduce((a,c)=>a+c,0)/scores.length:0;
      return{...sub,scores,avg};
    });
    const sorted=[...stats].sort((a,c)=>c.avg-a.avg);
    html+=`<div class="card" style="margin-bottom:14px">
      <h3 style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;letter-spacing:-.01em">

    html+=`<th>平均分</th></tr></thead><tbody>`;
    sorted.forEach((sub,i)=>{
      const rank=i===0?1:sub.avg===sorted[i-1].avg?sorted[i-1]._rank:i+1;
      sub._rank=rank;
      const gray=sub.avg<3&&sub.avg>0;const rc=rank===1?'rank-1':rank===2?'rank-2':rank===3?'rank-3':'rank-n';const rowc=rank<=3?`rank-row-${rank}`:'';
      const cat=sub.category||'个人奖';const catCls=cat==='个人奖'?'cat-personal':'cat-team';
      html+=`<tr class="${gray?'grayed':''} ${rowc}"><td><span class="rank-badge ${rc}">${rank}</span></td>
        <td style="font-weight:600">${esc(sub.department)}</td><td><span class="cat-tag ${catCls}">${cat}</span></td><td style="max-width:200px;white-space:normal;color:var(--text2)">${esc(sub.reason)}</td>`;

      html+=`<td><span class="avg-val ${gray?'low':''}">${sub.avg>0?sub.avg.toFixed(2):'-'}</span></td></tr>`;
    });
    html+='</tbody></table></div>';
  });
  el.innerHTML=html;

function scoreToArr(s){if(Array.isArray(s))return s;if(!s||s===0)return[0,0,0,0,0];const a=[0,0,0,0,0];for(let i=0;i<5;i++){if(s>i+0.5)a[i]=1;else if(s>i)a[i]=0.5;else a[i]=0;}return a;}
function scoreVal(s){if(Array.isArray(s))return s.reduce((a,c)=>a+c,0);return s||0;}

  }

  // Calculate progress
  const allSubIds=[];board.awards.forEach(a=>a.submissions.forEach(s=>allSubIds.push(s.id)));
  const ratedCount=allSubIds.filter(sid=>{const s=(board.scores[user.id]||{})[sid];return s&&scoreVal(s)>0;}).length;
  const totalCount=allSubIds.length;
  const pct=totalCount?Math.round(ratedCount/totalCount*100):0;
  let html=`<div class="scoring-progress"><div class="prog-info"><div class="prog-label">评分进度：<span class="prog-num">${ratedCount}</span> / ${totalCount} 项</div><div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div></div><div class="prog-pct">${pct}%</div></div>`;
  html+=`<div class="scoring-tip"><span class="tip-icon">i</span><span style="line-height:1.8">评分说明：<br>• 五分制打分规则。半颗星 = 0.5分，一颗星 = 1分。<br>• 分数提交后不可更改，请各位评委老师仔细审阅。</span></div>`;
  board.awards.forEach(award=>{
    if(!award.submissions.length)return;
    const criteriaText=award.criteria||'';
    // Sort: 个人奖 first, 团队奖 after
    const sortedSubs=[...award.submissions].sort((x,y)=>{
      const cx=x.category||'个人奖',cy=y.category||'个人奖';

    });

      html+=`<div class="scoring-sub ${sv===0?'unrated':''}" id="sub-${sub.id}">

function buildStars(sa){if(!Array.isArray(sa))sa=scoreToArr(sa);let h='';for(let i=0;i<5;i++){let cls='star-empty';if(sa[i]===1)cls='star-full';else if(sa[i]===0.5)cls='star-half';h+=`<span class="star ${cls}" data-n="${i+1}"><span class="star-bg">★</span><span class="star-fg">★</span></span>`;}return h;}
function bindStarClicks(){document.querySelectorAll('.stars .star').forEach(el=>{el.addEventListener('click',function(){const n=parseInt(this.dataset.n);handleStar(this.closest('.stars').id.replace('stars-',''),n);});});}
function handleStar(subId,n){
  const userId=getCurUser().id,boardId=localStorage.getItem('curBoardId');
  DB=loadDB();const board=DB.boards.find(b=>b.id===boardId);if(!board)return;
  if(!board.scores[userId])board.scores[userId]={};
  let sa=scoreToArr(board.scores[userId][subId]);
  const idx=n-1,curVal=sa.reduce((a,c)=>a+c,0);
  if(curVal===n){
    // clicking the same max star → cancel (clear all)
    sa=[0,0,0,0,0];
  }else if(curVal>n){
    // clicking lower star → reduce to n-1 full + half
    for(let i=0;i<idx;i++)sa[i]=1;
    for(let i=idx;i<5;i++)sa[i]=0;
    sa[idx]=0.5;
  }else if(curVal===n-0.5){
    // same star already at half → make it full
    for(let i=0;i<idx;i++)sa[i]=1;
    for(let i=idx+1;i<5;i++)sa[i]=0;
    sa[idx]=1;
  }else{
    // clicking higher star → fill up to n-1 full + half
    for(let i=0;i<idx;i++)sa[i]=1;
    for(let i=idx+1;i<5;i++)sa[i]=0;
    sa[idx]=0.5;
  }
  board.scores[userId][subId]=sa;
  try{saveDB();}catch(e){delete board.scores[userId][subId];toast('数据保存失败，请稍后重试','err');return;}
  const sv=sa.reduce((a,c)=>a+c,0);
  const starsEl=document.getElementById('stars-'+subId);
  for(let i=0;i<5;i++){
    const star=starsEl.children[i];
    star.className='star';
    if(sa[i]===1)star.classList.add('star-full');
    else if(sa[i]===0.5)star.classList.add('star-half');
    else star.classList.add('star-empty');
  }
  document.getElementById('lbl-'+subId).textContent=sv>0?sv.toFixed(1)+'分':'未评分';
  document.getElementById('lbl-'+subId).className=sv>0?'score-label':'score-label none';
  const subEl=document.getElementById('sub-'+subId);if(subEl){if(sv>0)subEl.classList.remove('unrated');else subEl.classList.add('unrated');}
  updateScoringProgress();
}
function updateScoringProgress(){
  const user=getCurUser();if(!user)return;
  const boardId=localStorage.getItem('curBoardId');
  DB=loadDB();const board=DB.boards.find(b=>b.id===boardId);if(!board)return;
  const allSubIds=[];board.awards.forEach(a=>a.submissions.forEach(s=>allSubIds.push(s.id)));
  const ratedCount=allSubIds.filter(sid=>{const s=(board.scores[user.id]||{})[sid];return s&&scoreVal(s)>0;}).length;
  const totalCount=allSubIds.length;
  const pct=totalCount?Math.round(ratedCount/totalCount*100):0;
  const progEl=document.querySelector('.scoring-progress');
  if(progEl){
    progEl.querySelector('.prog-num').textContent=ratedCount;
    progEl.querySelector('.prog-label').innerHTML=`评分进度：<span class="prog-num">${ratedCount}</span> / ${totalCount} 项`;
    progEl.querySelector('.prog-fill').style.width=pct+'%';
    progEl.querySelector('.prog-pct').textContent=pct+'%';
  }
}
function submitScores(){
  const user=getCurUser();if(!user)return;
  const boardId=localStorage.getItem('curBoardId');
  DB=loadDB();const board=DB.boards.find(b=>b.id===boardId);if(!board)return;

  }

  openModal(`<h3>确认提交评分</h3>
    <div style="font-size:13px;color:var(--text2);line-height:1.8;margin-bottom:14px">
      您已完成全部 <strong style="color:var(--accent)">${ratedCount}</strong> 项评分。<br>
      <span style="color:var(--danger);font-weight:600">提交后评分将不可更改</span>，请确认无误后再提交。
    </div>
    <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">再检查一下</button><button class="btn btn-primary btn-lg" onclick="doSubmitScores()">确认提交</button></div>`);
}
function doSubmitScores(){
  const user=getCurUser();if(!user)return;
  const boardId=localStorage.getItem('curBoardId');
  DB=loadDB();const board=DB.boards.find(b=>b.id===boardId);if(!board)return;
  board.submitted[user.id]=true;
  try{saveDB();}catch(e){delete board.submitted[user.id];toast('数据保存失败，请稍后重试','err');return;}
  closeModal();
  renderScoring(user,board);
  toast('评分提交成功！','ok');
}
function getCurUser(){
  const id=localStorage.getItem('curUserId');if(!id)return null;
  const bid=localStorage.getItem('curBoardId');DB=loadDB();
  const board=DB.boards.find(b=>b.id===bid);if(board)return board.users.find(u=>u.id===id)||null;
  for(const b of DB.boards){const u=b.users.find(x=>x.id===id);if(u)return u;}return null;
}

// ── Export ──
function exportResults(){
  DB=loadDB();const boardId=localStorage.getItem('curBoardId')||currentBoardId;const board=DB.boards.find(b=>b.id===boardId);if(!board)return;
  const scored=board.users.filter(u=>board.submitted[u.id]);if(!scored.length||!board.awards.length){toast('暂无数据','err');return;}
  const filterTag=resultFilter!=='all'?'_'+resultFilter:'';
  let csv='﻿';board.awards.forEach(award=>{
    const subs=resultFilter==='all'?award.submissions:award.submissions.filter(s=>(s.category||'个人奖')===resultFilter);
    if(!subs.length)return;csv+=`奖项：${award.name}\n排名,提报部门,类型,提报原因,`;csv+=scored.map(u=>u.name).join(',')+',平均分\n';
    const stats=subs.map(sub=>{const scores=scored.map(u=>scoreVal((board.scores[u.id]&&board.scores[u.id][sub.id])||0));const valid=scores.filter(s=>s>0);const avg=valid.length?valid.reduce((a,c)=>a+c,0)/valid.length:0;return{...sub,scores,avg};});
    const sorted=[...stats].sort((a,c)=>c.avg-a.avg);
    sorted.forEach((sub,i)=>{const rank=i===0?1:sub.avg===sorted[i-1]._rank?sorted[i-1]._rank:i+1;sub._rank=rank;const cat=sub.category||'个人奖';csv+=`${rank},"${sub.department}","${cat}","${sub.reason}",`;csv+=sub.scores.map(s=>s>0?s.toFixed(1):'-').join(',');csv+=`,${sub.avg>0?sub.avg.toFixed(2):'-'}\n`;});csv+='\n';
  });dlFile(csv,'评分结果排名'+filterTag+'_'+ds()+'.csv');toast('导出成功','ok');
}
function exportDetail(){
  DB=loadDB();const boardId=localStorage.getItem('curBoardId')||currentBoardId;const board=DB.boards.find(b=>b.id===boardId);if(!board)return;
  if(!board.users.length){toast('暂无数据','err');return;}
  const filterTag=resultFilter!=='all'?'_'+resultFilter:'';
  const allSubs=[];board.awards.forEach(a=>{
    const subs=resultFilter==='all'?a.submissions:a.submissions.filter(s=>(s.category||'个人奖')===resultFilter);
    subs.forEach(s=>allSubs.push({awardName:a.name,...s}));
  });
  let csv='﻿用户姓名,状态,'+allSubs.map(s=>`"${s.awardName}-${s.department}"`).join(',')+'\n';
  board.users.forEach(u=>{const done=!!board.submitted[u.id];csv+=`"${u.name}","${done?'已评分':'未评分'}",`;csv+=allSubs.map(s=>{const sc=scoreVal((board.scores[u.id]&&board.scores[u.id][s.id])||0);return sc>0?sc.toFixed(1):'-';}).join(',');csv+='\n';});
  dlFile(csv,'用户评分明细'+filterTag+'_'+ds()+'.csv');toast('导出成功','ok');
}
function exportMyScores(){
  const user=getCurUser();if(!user)return;DB=loadDB();const boardId=localStorage.getItem('curBoardId');const board=DB.boards.find(b=>b.id===boardId);if(!board)return;
  const ur=board.scores[user.id]||{};let csv='﻿奖项,提报部门,提报原因,评分\n';
  board.awards.forEach(a=>{a.submissions.forEach(s=>{const score=scoreVal(ur[s.id]||0);csv+=`"${a.name}","${s.department}","${s.reason}",${score>0?score.toFixed(1):'未评分'}\n`;});});
  dlFile(csv,user.name+'_评分记录_'+ds()+'.csv');toast('导出成功','ok');
}
function dlFile(content,name,type){type=type||'text/csv;charset=utf-8;';const blob=new Blob([content],{type});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);}
function ds(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

// ── Backup / Restore ──
function backupData(){
  DB=loadDB();
  const json=JSON.stringify(DB,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='评分系统备份_'+ds()+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);
  toast('数据备份成功','ok');
}
function triggerRestore(){document.getElementById('restoreInput').click();}
function handleRestoreFile(e){
  const file=e.target.files[0];if(!file)return;e.target.value='';
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(!data.admin||!Array.isArray(data.boards)){toast('文件格式不正确，请选择有效的备份文件','err');return;}
      openModal(`<h3>确认恢复数据</h3>
        <div style="background:var(--danger-bg);border:1px solid rgba(229,72,77,.15);border-radius:var(--r-sm);padding:12px 16px;font-size:13px;color:var(--danger);margin-bottom:14px;font-weight:500;line-height:1.6">
          ⚠️ 恢复操作将<strong>覆盖当前所有数据</strong>，且不可撤销。建议先备份当前数据再恢复。
        </div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:6px;font-weight:500">备份文件信息：</div>
        <div style="font-size:12px;color:var(--text3);line-height:1.8">
          · 看板数量：${data.boards.length}<br>
          · 奖项总数：${data.boards.reduce((s,b)=>s+b.awards.length,0)}<br>
          · 用户总数：${data.boards.reduce((s,b)=>s+b.users.length,0)}
        </div>
        <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-danger" onclick="confirmRestore()">确认恢复</button></div>`);
      window._restoreData=data;
    }catch(err){toast('文件解析失败: '+err.message,'err');}
  };reader.readAsText(file);
}
function confirmRestore(){
  if(!window._restoreData){toast('恢复数据丢失','err');return;}
  DB=normalizeDB(window._restoreData);saveDB();delete window._restoreData;
  closeModal();currentBoardId=null;showKanbanView();renderKanban();toast('数据恢复成功','ok');
}

// ── Batch User Import ──
function triggerImportUsers(){importBoardId=currentBoardId;document.getElementById('userFileInput').click();}
function handleUserFileSelect(e){
  const file=e.target.files[0];if(!file)return;e.target.value='';const bid=importBoardId||currentBoardId;
  if(!bid){toast('请先进入一个看板','err');return;}
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      let rows;
      if(typeof XLSX!=='undefined'&&(file.name.endsWith('.xlsx')||file.name.endsWith('.xls'))){
        const wb=XLSX.read(ev.target.result,{type:'array'});rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1});
      }else{rows=new TextDecoder().decode(ev.target.result).split(/\r?\n/).filter(r=>r.trim()).map(r=>parseCSVLine(r));}
      if(!rows||rows.length<2){toast('文件内容为空或格式不正确','err');return;}
      const header=rows[0].map(h=>String(h??'').trim());
      const cN=header.findIndex(h=>h.includes('姓名')),cA=header.findIndex(h=>h.includes('账号')),cP=header.findIndex(h=>h.includes('密码'));
      if(cN===-1||cA===-1||cP===-1){toast('表头需包含"姓名"、"登录账号"、"登录密码"','err');return;}
      const dr=rows.slice(1).filter(r=>r.length>=3&&r[cN]);
      if(!dr.length){toast('未找到有效数据行','err');return;}
      let p='<table><thead><tr><th>姓名</th><th>登录账号</th><th>登录密码</th></tr></thead><tbody>';
      dr.slice(0,30).forEach(r=>{p+=`<tr><td>${esc(String(r[cN]||''))}</td><td>${esc(String(r[cA]||''))}</td><td>${esc(String(r[cP]||''))}</td></tr>`;});
      if(dr.length>30)p+=`<tr><td colspan="3" style="text-align:center;color:var(--text4)">...共${dr.length}行</td></tr>`;
      p+='</tbody></table>';
      openModal(`<h3>导入用户预览（共${dr.length}人）</h3><div class="modal-preview">${p}</div>
        <div class="modal-actions"><button class="btn btn-ghost" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="confirmImportUsers()">确认导入</button></div>`);
      window._importUserData={bid,cN,cA,cP,dr};
    }catch(err){toast('文件解析失败: '+err.message,'err');}
  };reader.readAsArrayBuffer(file);
}
async function confirmImportUsers(){
  try{
    if(!window._importUserData){toast('导入数据丢失，请重新选择文件','err');return;}
    const{bid,cN,cA,cP,dr}=window._importUserData;
    DB=loadDB();const b=DB.boards.find(x=>x.id===bid);if(!b){toast('看板不存在','err');return;}
    let n=0,skip=0;
    for(const r of dr){
      const name=String(r[cN]??'').trim(),account=String(r[cA]??'').trim(),pwdRaw=String(r[cP]??'').trim();
      if(!name||!account||!pwdRaw){skip++;continue;}
      if(b.users.some(u=>u.account===account)){skip++;continue;}
      if(DB.boards.some(bb=>bb.users.some(u=>u.account===account))){skip++;continue;}
      if(account===DB.admin.username){skip++;continue;}
      const pwdHash=await sha256(pwdRaw);
      b.users.push({id:uid(),name,account,password:pwdHash,token:generateToken()});n++;
    }
    saveDB();closeModal();delete window._importUserData;
    if(currentBoardId===bid){renderBoardDetail(bid);}else{renderKanban();}
    toast(`成功导入 ${n} 个用户${skip>0?'，跳过 '+skip+' 个（账号重复或信息不全）':''}`,'ok');
  }catch(e){toast('导入失败: '+e.message,'err');}
}
function downloadUserTemplate(){
  const csv='﻿姓名,登录账号,登录密码\n张三,zhangsan,123456\n李四,lisi,123456\n王五,wangwu,123456\n';
  dlFile(csv,'用户导入模板_'+ds()+'.csv','text/csv;charset=utf-8');toast('模板已下载','ok');
}

// ── Auto-login ──
function tryAutoLogin(){
  const hash=window.location.hash;if(!hash||!hash.startsWith('#t='))return false;
  const token=hash.substring(3);DB=loadDB();
  for(const board of DB.boards){const user=board.users.find(u=>u.token===token);if(user){localStorage.setItem('sessMode','user');localStorage.setItem('curBoardId',board.id);localStorage.setItem('curUserId',user.id);touchSession();showPage('userPage');renderScoring(user,board);return true;}}
  toast('链接无效或已失效','err');return false;
}

(async function(){
  document.getElementById('loadingPage').style.display='flex';
  document.getElementById('loginPage').style.display='none';
  await initDB();
  document.getElementById('loadingPage').style.display='none';
  if(tryAutoLogin()) return;
  const mode=localStorage.getItem('sessMode');
  if(mode==='admin'){if(!checkSession())return;touchSession();showPage('adminPage');renderKanban();return;}
  if(mode==='user'){if(!checkSession())return;touchSession();
    const uid=localStorage.getItem('curUserId'),bid=localStorage.getItem('curBoardId');
    if(uid&&bid){const board=DB.boards.find(b=>b.id===bid);if(board){const user=board.users.find(u=>u.id===uid);if(user){showPage('userPage');renderScoring(user,board);return;}}}
    localStorage.removeItem('sessMode');localStorage.removeItem('curBoardId');localStorage.removeItem('curUserId');localStorage.removeItem('sessTime');
  }
  showPage('loginPage');
})();
